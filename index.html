<html>
<head>
<title>Color Change</title>

<script>
function change() {
    document.bgColor = "green";
    setTimeout(change1, 1000);
}

function change1() {
    document.bgColor = "red";
    setTimeout(change2, 1000);
}

function change2() {
    document.bgColor = "orange";
    setTimeout(change3, 1000);
}

function change3() {
    document.bgColor = "pink";
    setTimeout(change4, 1000);
}

function change4() {
    document.bgColor = "yellow";
    setTimeout(change5, 1000);
}

function change5() {
    document.bgColor = "blue";
    setTimeout(change6, 1000);
}

function change6() {
    document.bgColor = "black";
    setTimeout(msg, 1000);
}

function msg() {
    alert("Seven colors completed!");
}
</script>

</head>

<body>

<input type="button" value="See color change" 
onmousedown="window.setTimeout(change, 1000)">

<br><br>

<input type="button" value="Click Me" onclick="msg()">

</body>
</html>
