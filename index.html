<html>
<head>
<title>SO........l..(Advanced Javascript) Count vowels</title>

<script language="javascript">
function count()
{
    var ch, count = 0;
    var str = f1.t1.value;

    for(i = 0; i < str.length; i++)
    {
        ch = str.charAt(i);

        if(ch=='A' || ch=='a' || ch=='E' || ch=='e' ||
           ch=='I' || ch=='i' || ch=='O' || ch=='o' ||
           ch=='U' || ch=='u')
        {
            count++;
        }
    }
    alert("Number of vowels are " + count);
}
</script>
</head>

<body>
<form name="f1">
    <input type="text" name="t1">
    <input type="submit" value="Count Vowels" onclick="count()">
</form>
</body>
</html>
